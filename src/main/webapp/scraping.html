<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Films</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="config.js"></script>
    <script src="auth-header.js"></script>
    <div id="app">
        <a class="retour" href="index.html">← Accueil</a>
        <h1>Films</h1>

        <!-- Barre de recherche -->
        <div class="search-bar">
            <input v-model="query"
                   placeholder="Titre du film…"
                   @keyup.enter="rechercher" />
            <button @click="rechercher" :disabled="chargement || !query.trim()">
                {{ chargement ? 'Recherche…' : 'Rechercher' }}
            </button>
        </div>

        <!-- Messages -->
        <p class="msg-error" v-if="erreur">{{ erreur }}</p>
        <p class="loading" v-else-if="chargement">Chargement…</p>

        <!-- Résultat -->
        <div class="film-card" v-else-if="film">
            <img v-if="film.poster && film.poster.imageUrl"
                 :src="film.poster.imageUrl"
                 :alt="film.title" />
            <div class="no-image" v-else>Pas d'image</div>

            <div class="details">
                <h2>{{ film.title }}</h2>
                <p class="year" v-if="film.publicationYear">{{ film.publicationYear }}</p>

                <template v-if="film.artists && film.artists.length > 0">
                    <h3>Artistes</h3>
                    <ul>
                        <li v-for="(a, i) in film.artists" :key="i">
                            {{ a.firstName }} {{ a.lastName }}
                        </li>
                    </ul>
                </template>
                <p v-else style="color:#aaa; font-size:0.9em;">Aucun artiste renseigné.</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const API_URL      = GATEWAY_URL + '/api/scrap/film'
        const POSTERS_URL  = GATEWAY_URL + '/api/posters'
        const ARTISTS_URL  = GATEWAY_URL + '/api/artistes'

        function getAuthHeaders(extra = {}) {
            const token = localStorage.getItem('authToken')
            const headers = { ...extra }
            if (token) headers.Authorization = `Bearer ${token}`
            return headers
        }

        Vue.createApp({
            data() {
                return {
                    query:      '',
                    film:       null,
                    chargement: false,
                    erreur:     null,
                }
            },

            methods: {
                async rechercher() {
                    const q = this.query.trim()
                    if (!q) return

                    this.chargement = true
                    this.erreur     = null
                    this.film       = null

                    try {
                        const res = await fetch(`${API_URL}?query=${encodeURIComponent(q)}`, {
                            headers: getAuthHeaders()
                        })
                        if (!res.ok) {
                            const err = await res.json().catch(() => ({}))
                            throw new Error(err.message || `Erreur ${res.status}`)
                        }
                        this.film = await res.json()
                        if (this.film.artists && this.film.artists.length > 0) {
                            for (const artist of this.film.artists) {
                                const nom = artist.lastName || artist.nom
                                const prenom = artist.firstName || artist.prenom
                                if (!nom || !prenom) continue
                                try {
                                    const artistRes = await fetch(ARTISTS_URL, {
                                        method:  'POST',
                                        headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
                                        body:    JSON.stringify({ nom, prenom, age: artist.age ?? null })
                                    })
                                    if (!artistRes.ok && artistRes.status !== 409) {
                                        const err = await artistRes.json().catch(() => ({}))
                                        console.warn('Sauvegarde artiste :', err.message || artistRes.status)
                                    }
                                } catch (e) {
                                    console.warn('Sauvegarde artiste :', e.message)
                                }
                            }
                        }

                        if (this.film.poster && this.film.poster.imageUrl) {
                            const id    = this.film.poster.imdbId ||
                                (this.film.title + (this.film.publicationYear ? '-' + this.film.publicationYear : ''))
                                    .toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '')
                            const titre = this.film.title
                            const url   = this.film.poster.imageUrl
                            try {
                                const posterRes = await fetch(POSTERS_URL, {
                                    method:  'POST',
                                    headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
                                    body:    JSON.stringify({ id, titre, url })
                                })
                                if (!posterRes.ok && posterRes.status !== 409) {
                                    const err = await posterRes.json().catch(() => ({}))
                                    console.warn('Sauvegarde poster :', err.message || posterRes.status)
                                }
                            } catch (e) {
                                console.warn('Sauvegarde poster :', e.message)
                            }
                        }
                    } catch (e) {
                        this.erreur = 'Impossible de récupérer le film : ' + e.message
                    } finally {
                        this.chargement = false
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
