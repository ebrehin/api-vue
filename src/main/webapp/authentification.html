<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>API Vue — Authentification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Authentification</h1>
    <p>Connectez-vous ou créez un compte.</p>

    <section class="form-section">
        <h2>Connexion</h2>
        <p class="msg-error" id="login-error" style="display:none;"></p>
        <p class="msg-info" id="login-success" style="display:none;"></p>
        <form id="login-form">
            <div class="form-row">
                <label for="login-pseudo">Pseudo</label>
                <input id="login-pseudo" type="text" placeholder="alice" required>
            </div>
            <div class="form-row">
                <label for="login-password">Mot de passe</label>
                <input id="login-password" type="password" placeholder="••••••••" required>
            </div>
            <div class="form-actions">
                <button class="btn-primary" type="submit">Se connecter</button>
                <button class="btn-secondary" type="reset">Effacer</button>
            </div>
        </form>
    </section>

    <a class="retour" href="index.html">← Retour à l'accueil</a>

    <script src="config.js"></script>
    <script src="authentification.js" defer></script>
</body>
</html>
